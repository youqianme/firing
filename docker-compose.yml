services:
  # 开发环境服务
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    command: npm run dev:web
    restart: unless-stopped

  # 生产环境服务
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_ENV=production
    volumes:
      - ./data:/app/data
    command: npm run start:web
    restart: unless-stopped

volumes:
  node_modules:
  data:
